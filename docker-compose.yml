services:
  agnocast-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: agnocast:latest
    container_name: agnocast-dev
    privileged: true
    network_mode: host
    ipc: host
    pid: host
    volumes:
      - .:/workspace
      - /lib/modules:/lib/modules:ro
      - /dev/agnocast:/dev/agnocast
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - AGNOCAST_MEMPOOL_SIZE=10000000
    stdin_open: true
    tty: true
    working_dir: /workspace
    command: /bin/bash

  agnocast-talker:
    image: agnocast:latest
    container_name: agnocast-talker
    privileged: true
    network_mode: host
    ipc: host
    pid: host
    volumes:
      - .:/workspace
      - /lib/modules:/lib/modules:ro
      - /dev/agnocast:/dev/agnocast
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - AGNOCAST_MEMPOOL_SIZE=10000000
    depends_on:
      - agnocast-dev
    command: bash -c "source /workspace/install/setup.bash && export LD_PRELOAD=/usr/local/lib/libagnocast_heaphook.so && bash /workspace/scripts/run_talker"

  agnocast-listener:
    image: agnocast:latest
    container_name: agnocast-listener
    privileged: true
    network_mode: host
    ipc: host
    pid: host
    volumes:
      - .:/workspace
      - /lib/modules:/lib/modules:ro
      - /dev/agnocast:/dev/agnocast
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - AGNOCAST_MEMPOOL_SIZE=10000000
    depends_on:
      - agnocast-dev
    command: bash -c "source /workspace/install/setup.bash && export LD_PRELOAD=/usr/local/lib/libagnocast_heaphook.so && bash /workspace/scripts/run_listener"
